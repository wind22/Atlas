name: Run survival backtest

# Manually-triggered survival backtest (architecture.md §9). Pulls real long
# history via yfinance (GitHub runners can reach Yahoo), scores the regime on
# every bar, and produces a report: did the system flip defensive before/early
# in 2000 / 2008 / 2018Q4 / 2020 / 2022? The report is uploaded as an artifact
# AND committed to reports/ so the Pages site can serve it (deploy-pages copies
# reports/ into the published site). The commit carries [skip ci].

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "标的（逗号分隔；留空=SPY,QQQ+全部自选）"
        default: ""
      period:
        description: "历史窗口"
        default: "max"
  # Auto-rerun when the backtest logic or this workflow changes (re-validate).
  push:
    branches: [main]
    paths: ["atlas/backtest.py", ".github/workflows/backtest.yml"]

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backtest (real data)
        # Default: SPY,QQQ + the full watchlist (--watchlist). A non-empty
        # dispatch "tickers" input overrides with an explicit list instead.
        run: |
          TK="${{ github.event.inputs.tickers }}"
          if [ -n "$TK" ]; then SEL="--tickers $TK"; else SEL="--watchlist"; fi
          python -m atlas.backtest --online $SEL \
            --period "${{ github.event.inputs.period || 'max' }}" \
            --out reports
          test -s reports/backtest.html

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: survival-backtest
          path: reports/

      - name: Commit report to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/backtest.html reports/backtest.json
          if git diff --cached --quiet; then
            echo "report unchanged; nothing to commit"
            exit 0
          fi
          # No [skip ci]: this commit intentionally triggers deploy-pages to
          # publish the refreshed report. It touches only reports/, so it does
          # NOT re-trigger this backtest workflow (no loop).
          git commit -m "chore(backtest): 生存回测报告 $(date -u +%Y-%m-%d)"
          # Robust push: another workflow (deploy-pages snapshot) may push to
          # main concurrently, so rebase-and-retry instead of failing the race.
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then echo "pushed"; exit 0; fi
            echo "push rejected (attempt $i) — rebasing onto latest main"
            git fetch origin main && git rebase origin/main || git rebase --abort
            sleep 3
          done
          echo "::error::could not push report after retries"; exit 1
