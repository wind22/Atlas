name: Deploy dashboard to GitHub Pages

# Builds the Atlas dashboard (a self-contained HTML page) and publishes it to
# GitHub Pages. Uses the modern Actions-based Pages flow — no gh-pages branch.
#
# The daily snapshot DB (data/atlas_snapshots.sqlite) is committed back to the
# repo after each run so the NEXT run can load yesterday's snapshot. That is what
# makes the 2-day regime confirmation, 「较昨日变化」 highlight, and incremental
# alerts actually work — the CI container is otherwise ephemeral. The persist
# commit carries [skip ci] so it never re-triggers this workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # ~16:30 US Eastern on weekdays (after market close). UTC.
    - cron: "30 21 * * 1-5"

permissions:
  contents: write   # push the daily snapshot DB back to the repo
  pages: write
  id-token: write

# One deploy at a time; let a newer run supersede an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build dashboard
        # Try live data (GitHub runners can reach Yahoo Finance); fall back to
        # deterministic offline data so the page always builds green. The DB is
        # the checked-in snapshot from previous runs → confirmation/diff work.
        run: |
          mkdir -p public data
          python -m atlas --stocks AAPL,NVDA,MSFT --db data/atlas_snapshots.sqlite --output public/index.html \
            || python -m atlas --offline --db data/atlas_snapshots.sqlite --output public/index.html
          test -s public/index.html
          # Publish the survival backtest report too, if it has been generated.
          cp -f reports/backtest.html public/backtest.html 2>/dev/null || true
          cp -f reports/backtest.json public/backtest.json 2>/dev/null || true

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Persist snapshot DB
        # Commit today's snapshot back so the next run sees it. [skip ci] avoids
        # re-triggering. continue-on-error so a push race never fails the deploy.
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/atlas_snapshots.sqlite
          if git diff --cached --quiet; then
            echo "snapshot unchanged; nothing to commit"
          else
            git commit -m "chore(data): 每日快照 $(date -u +%Y-%m-%d) [skip ci]"
            git push origin HEAD:main
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
